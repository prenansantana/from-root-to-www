# fly.toml app configuration file generated for from-root-to-www on 2026-02-23T12:22:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'from-root-to-www'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 1234
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.checks]
    [http_service.checks.health]
      interval = "10s"
      timeout = "2s"
      grace_period = "5s"
      method = "GET"
      path = "/healthz"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
