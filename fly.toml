# fly.toml — from-root-to-www
# Minimal Go redirect service: bare domain -> www subdomain
# Docs: https://fly.io/docs/reference/configuration/

app = 'from-root-to-www'
primary_region = 'gru'

# Graceful shutdown: Go's http.Server handles SIGTERM well
kill_signal = 'SIGTERM'
kill_timeout = 5

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  max_unavailable = 1

[http_service]
  internal_port = 1234
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 200
    hard_limit = 250

  # Health check using the app's /healthz endpoint
  [[http_service.checks]]
    grace_period = '5s'
    interval = '15s'
    method = 'GET'
    timeout = '3s'
    path = '/healthz'

  [http_service.http_options]
    idle_timeout = 30

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['app']

[[restart]]
  policy = 'on-failure'
  retries = 5
  processes = ['app']
