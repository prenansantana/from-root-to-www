app = 'from-root-to-www'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 1234
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "10s"
      timeout = "2s"
      grace_period = "5s"
      method = "GET"
      path = "/healthz"

[[vm]]
  size = 'shared-cpu-1x'
  memory = 256
